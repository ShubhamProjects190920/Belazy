databases:
  - name: belazy-db
    plan: free
    databaseName: belazy
    user: belazy

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: belazy-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: belazy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://belazy-frontend.onrender.com
      - key: BACKEND_CORS_ORIGINS
        value: '["https://belazy-frontend.onrender.com"]'
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM_EMAIL
        sync: false
      - key: EMAILS_FROM_NAME
        value: Belazy
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_MONTHLY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS
        value: "48"
      - key: PASSWORD_RESET_TOKEN_EXPIRE_HOURS
        value: "24"

  # ── React Frontend (Static Site — Always Free) ────────────────────────────────
  - type: web
    name: belazy-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://belazy-backend.onrender.com/api/v1
